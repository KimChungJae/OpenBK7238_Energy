          python3 scripts/hlw8112_bk7238_tune30.py
          python3 scripts/hlw8112_bk7238_tune31.py
          python3 scripts/hlw8112_bk7238_tune32.py
          python3 scripts/hlw8112_bk7238_tune33.py
          python3 scripts/hlw8112_bk7238_tune34.py
          python3 scripts/hlw8112_bk7238_tune35.py
          python3 scripts/hlw8112_bk7238_tune36.py
          python3 scripts/hlw8112_bk7238_tune37.py
          python3 scripts/hlw8112_bk7238_tune38.py
          python3 scripts/hlw8112_bk7238_tune39.py
          python3 scripts/hlw8112_bk7238_tune40.py
          python3 scripts/hlw8112_bk7238_tune41.py
          python3 scripts/hlw8112_bk7238_tune42.py
          python3 scripts/hlw8112_bk7238_tune43.py
          python3 scripts/hlw8112_bk7238_tune44.py
          python3 scripts/hlw8112_bk7238_tune45.py
          python3 scripts/hlw8112_bk7238_tune46.py
          python3 scripts/hlw8112_bk7238_tune47.py
          python3 scripts/hlw8112_bk7238_tune48.py
          python3 scripts/hlw8112_bk7238_tune49.py
          python3 scripts/hlw8112_bk7238_tune50.py
          python3 scripts/hlw8112_bk7238_tune51.py
          python3 scripts/hlw8112_bk7238_tune52.py
          python3 scripts/hlw8112_bk7238_tune53.py
          python3 scripts/hlw8112_bk7238_tune54.py

          grep -q "IONE_BK7238_REGFIX45" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX46" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX47" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX48" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX49" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX50" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX51" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX52" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX53" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX54" src/driver/drv_hlw8112.c
          grep -q "IONE-Energy-Meta-2CH" src/user_main.c
          grep -q "IONE_ApplyMqttTopicMacSuffix" src/user_main.c
          grep -q "PHASE verify fail" src/driver/drv_hlw8112.c
          grep -q 'CMD_RegisterCommand("HLW8112_phase"' src/driver/drv_hlw8112.c
          grep -q 'CMD_RegisterCommand("HLW8112_pagain"' src/driver/drv_hlw8112.c
          grep -q 'CMD_RegisterCommand("HLW8112_psgain"' src/driver/drv_hlw8112.c
          grep -q "mqttTopic = CFG_GetMQTTClientId()" src/driver/drv_hlw8112.c
          ! grep -q "IONE_MQTT_ENERGY_TOPIC" src/driver/drv_hlw8112.c
          grep -q '\\"Export_A\\":%.3f,\\"Export_B\\":%.3f' src/driver/drv_hlw8112.c
          grep -q '"Power Factor", "%"' src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX43" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX44" src/driver/drv_hlw8112.c
          grep -q "HLW8112_LocalYmd" src/driver/drv_hlw8112.c
          grep -q "HLW8112_PeriodicFlashSave" src/driver/drv_hlw8112.c
          grep -q "Today_A" src/driver/drv_hlw8112.c
          ! grep -q '"Power_T"' src/driver/drv_hlw8112.c

          grep -q "g_indexAutoRefreshInterval = 10000" src/httpserver/new_http.c

          grep -q "DEFAULT_RES_KU.*1.5f" src/driver/drv_hlw8112.h



      - name: Build OpenBK7238 hlw8112

        run: |

          SHA="$(git rev-parse --short=12 HEAD)"

          APP_VER="${SHA}_hlw8112_spifix54"

          make APP_VERSION="${APP_VER}" APP_NAME=OpenBK7238 VARIANT=hlw8112 OpenBK7238

          mkdir -p artifact

          cp "output/${APP_VER}/OpenBK7238_${APP_VER}.rbl" artifact/

          cp "output/${APP_VER}/OpenBK7238_QIO_${APP_VER}.bin" artifact/ 2>/dev/null || true

          ls -la artifact/



      - name: Upload RBL

        uses: actions/upload-artifact@v4

        with:

          name: OpenBK7238_hlw8112_rbl

          path: artifact/*.rbl

          if-no-files-found: error

