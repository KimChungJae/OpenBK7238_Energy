          grep -q 'CMD_RegisterCommand("HLW8112_pagain"' src/driver/drv_hlw8112.c
          grep -q 'CMD_RegisterCommand("HLW8112_psgain"' src/driver/drv_hlw8112.c
          grep -q "mqttTopic = CFG_GetMQTTClientId()" src/driver/drv_hlw8112.c
          ! grep -q "IONE_MQTT_ENERGY_TOPIC" src/driver/drv_hlw8112.c
          grep -q '\\"Export_A\\":%.3f,\\"Export_B\\":%.3f' src/driver/drv_hlw8112.c
          grep -q '"Power Factor", "%"' src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX43" src/driver/drv_hlw8112.c
          grep -q "IONE_BK7238_REGFIX44" src/driver/drv_hlw8112.c
          grep -q "HLW8112_LocalYmd" src/driver/drv_hlw8112.c
          grep -q "HLW8112_PeriodicFlashSave" src/driver/drv_hlw8112.c
          grep -q "Today_A" src/driver/drv_hlw8112.c
          ! grep -q '"Power_T"' src/driver/drv_hlw8112.c

          grep -q "g_indexAutoRefreshInterval = 10000" src/httpserver/new_http.c

          grep -q "DEFAULT_RES_KU.*1.5f" src/driver/drv_hlw8112.h



      - name: Build OpenBK7238 hlw8112

        run: |

          SHA="$(git rev-parse --short=12 HEAD)"

          APP_VER="${SHA}_hlw8112_spifix67"

          make APP_VERSION="${APP_VER}" APP_NAME=OpenBK7238 VARIANT=hlw8112 OpenBK7238

          mkdir -p artifact

          # Artifact: UART(UA) + OTA(rbl) 2개만
          cp "output/${APP_VER}/OpenBK7238_${APP_VER}.rbl" artifact/
          cp "output/${APP_VER}/OpenBK7238_UA_${APP_VER}.bin" artifact/
          test -f "artifact/OpenBK7238_${APP_VER}.rbl"
          test -f "artifact/OpenBK7238_UA_${APP_VER}.bin"
          ls -la artifact/



      - name: Upload firmware artifacts

        uses: actions/upload-artifact@v4

        with:

          name: OpenBK7238_hlw8112_spifix67

          path: |

            artifact/*.rbl

            artifact/*_UA_*.bin

          if-no-files-found: error

