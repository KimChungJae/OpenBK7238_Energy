# PM01_A003 (T1-U-HL / BK7238 + HLW8112 SPI) 전용 빌드
# Fork 저장소에 .github/workflows/ 아래로 복사 후 Actions → Run workflow
name: Build BK7238 HLW8112

on:
  workflow_dispatch:

env:
  APP_NAME: OpenBK7231T_App

jobs:
  build:
    name: OpenBK7238 hlw8112
    runs-on: ubuntu-22.04
    steps:
      - name: Source checkout
        uses: actions/checkout@v4

      - name: Build OpenBK7238 hlw8112
        run: |
          SHA="$(git rev-parse --short=12 HEAD)"
          APP_VER="${SHA}_hlw8112"
          echo "APP_VERSION=${APP_VER}"
          make APP_VERSION="${APP_VER}" APP_NAME=OpenBK7238 VARIANT=hlw8112 OpenBK7238
          mkdir -p artifact
          cp "output/${APP_VER}/OpenBK7238_${APP_VER}.rbl" artifact/
          ls -la artifact/

      - name: Upload RBL
        uses: actions/upload-artifact@v4
        with:
          name: OpenBK7238_hlw8112_rbl
          path: artifact/*.rbl
          if-no-files-found: error
